# Pre-commit hooks for the EasyDeL workspace
# Install with: uv run pre-commit install --hook-type pre-commit --hook-type pre-push

default_stages: [pre-commit]

repos:
  # General fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: autoscale/easydel-cluster-template.yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Python code formatting with ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Run the linter
      - id: ruff
        args: ["--fix"]
      # Run the formatter
      - id: ruff-format

  # Type checking with mypy (optional, can be slow)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       additional_dependencies: [types-all]
  #       args: ['--ignore-missing-imports']

  # Security checks (commented due to dependency issues)
  # - repo: https://github.com/PyCQA/bandit
  #   rev: 1.7.5
  #   hooks:
  #     - id: bandit
  #       args: ['-ll', '--skip', 'B101,B601']
  #       exclude: ^tests/

  # Dockerfile linting (requires Docker permissions)
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.12.0
  #   hooks:
  #     - id: hadolint-docker
  #       args: ['--ignore', 'DL3008', '--ignore', 'DL3009']



  # Python docstring formatting
  # - repo: https://github.com/PyCQA/docformatter
  #   rev: v1.5.1
  #   hooks:
  #     - id: docformatter
  #       args: ['--in-place', '--wrap-summaries=121', '--wrap-descriptions=121']

  # Check for common security issues (commented out due to repo issues)
  # - repo: https://github.com/pre-commit/mirrors-safety
  #   rev: v3.0.1
  #   hooks:
  #     - id: safety
  #       args: ['--json', '--ignore=70612']  # Ignore specific vulnerabilities if needed

  # Local hooks
  - repo: local
    hooks:
      # - id: no-commit-to-main
      #   name: Don't commit to main branch
      #   entry: bash -c 'if [[ $(git symbolic-ref --short HEAD) == "main" ]]; then echo "Direct commits to main branch are not allowed."; exit 1; fi'
      #   language: system
      #   pass_filenames: false
      #   always_run: true

      - id: check-easydel-imports
        name: Check EasyDeL imports
        entry: .venv/bin/python -c "import easydel as ed;import jax;print(jax.devices())" # Placeholder - can add actual import checks
        language: python
        types: [python]
        pass_filenames: false

      - id: subtree-mirror-sync
        name: Push libs/* updates to standalone mirrors
        description: Pushes spectrax/ejkernel/eformer subtrees to their mirror repos when they changed (SUBTREE_SYNC_SKIP=1 to bypass)
        entry: scripts/subtree-sync.sh auto
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        verbose: true

      - id: docker-build-push
        name: Docker Build and Push (Manual)
        description: Build and optionally push Docker images when DOCKER_BUILD is set
        entry: bash -c 'if [[ -n "$DOCKER_BUILD" ]]; then ./scripts/docker-build-push.sh $DOCKER_BUILD_ARGS; fi'
        language: system
        pass_filenames: false
        always_run: false
        stages: [manual]
