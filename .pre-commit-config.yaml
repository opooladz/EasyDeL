# Pre-commit hooks for the EasyDeL workspace
# Install with: uv run pre-commit install --hook-type pre-commit --hook-type pre-push

default_stages: [pre-commit]

repos:
  # General fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        exclude: autoscale/easydel-cluster-template.yaml
      - id: check-json
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: ["--maxkb=1000"]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
        args: ["--fix=lf"]

  # Python code formatting with ruff. Lint rules for libs/ members come from
  # their own per-lib hooks (each with its lib's config); the global linter
  # must not also lint libs/ or the two configs fix-fight over import order.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Run the linter
      - id: ruff
        stages: [pre-commit]
        args: ["--fix"]
        exclude: ^libs/
      # Run the formatter
      - id: ruff-format
        stages: [pre-commit]

  # Type checking with mypy (optional, can be slow)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       additional_dependencies: [types-all]
  #       args: ['--ignore-missing-imports']

  # Security checks (commented due to dependency issues)
  # - repo: https://github.com/PyCQA/bandit
  #   rev: 1.7.5
  #   hooks:
  #     - id: bandit
  #       args: ['-ll', '--skip', 'B101,B601']
  #       exclude: ^tests/

  # Dockerfile linting (requires Docker permissions)
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.12.0
  #   hooks:
  #     - id: hadolint-docker
  #       args: ['--ignore', 'DL3008', '--ignore', 'DL3009']



  # Python docstring formatting
  # - repo: https://github.com/PyCQA/docformatter
  #   rev: v1.5.1
  #   hooks:
  #     - id: docformatter
  #       args: ['--in-place', '--wrap-summaries=121', '--wrap-descriptions=121']

  # Check for common security issues (commented out due to repo issues)
  # - repo: https://github.com/pre-commit/mirrors-safety
  #   rev: v3.0.1
  #   hooks:
  #     - id: safety
  #       args: ['--json', '--ignore=70612']  # Ignore specific vulnerabilities if needed

  # Local hooks
  - repo: local
    hooks:
      # - id: no-commit-to-main
      #   name: Don't commit to main branch
      #   entry: bash -c 'if [[ $(git symbolic-ref --short HEAD) == "main" ]]; then echo "Direct commits to main branch are not allowed."; exit 1; fi'
      #   language: system
      #   pass_filenames: false
      #   always_run: true

      - id: check-easydel-imports
        stages: [pre-commit]
        name: Check EasyDeL imports
        entry: .venv/bin/python -c "import os;os.environ['JAX_PLATFORMS'] = '';import easydel as ed;import jax;print(jax.devices())" # Placeholder - can add actual import checks
        language: python
        types: [python]
        pass_filenames: false

      - id: ruff-easydel
        name: ruff lint+fix (libs/easydel)
        description: Lints and auto-fixes libs/easydel with its own ruff config
        entry: ruff check --fix --config libs/easydel/pyproject.toml
        language: python
        additional_dependencies: ["ruff==0.15.16"]
        types: [python]
        files: ^libs/easydel/
        stages: [pre-commit]
      - id: ruff-spectrax
        name: ruff lint+fix (libs/spectrax)
        description: Lints and auto-fixes libs/spectrax with its own ruff config
        entry: ruff check --fix --config libs/spectrax/pyproject.toml
        language: python
        additional_dependencies: ["ruff==0.15.16"]
        types: [python]
        files: ^libs/spectrax/
        stages: [pre-commit]
      - id: ruff-ejkernel
        name: ruff lint+fix (libs/ejkernel)
        description: Lints and auto-fixes libs/ejkernel with its own ruff config
        entry: ruff check --fix --config libs/ejkernel/pyproject.toml
        language: python
        additional_dependencies: ["ruff==0.15.16"]
        types: [python]
        files: ^libs/ejkernel/
        stages: [pre-commit]
      - id: ruff-eformer
        name: ruff lint+fix (libs/eformer)
        description: Lints and auto-fixes libs/eformer with its own ruff config
        entry: ruff check --fix --config libs/eformer/pyproject.toml
        language: python
        additional_dependencies: ["ruff==0.15.16"]
        types: [python]
        files: ^libs/eformer/
        stages: [pre-commit]
      - id: uv-lock-easydel
        name: uv.lock fresh for libs/easydel
        description: Pushing changes to libs/easydel/pyproject.toml requires a refreshed workspace uv.lock
        entry: uv lock --check
        language: system
        files: ^libs/easydel/pyproject\.toml$
        pass_filenames: false
        stages: [pre-push]
      - id: uv-lock-spectrax
        name: uv.lock fresh for libs/spectrax
        description: Pushing changes to libs/spectrax/pyproject.toml requires a refreshed workspace uv.lock
        entry: uv lock --check
        language: system
        files: ^libs/spectrax/pyproject\.toml$
        pass_filenames: false
        stages: [pre-push]
      - id: uv-lock-ejkernel
        name: uv.lock fresh for libs/ejkernel
        description: Pushing changes to libs/ejkernel/pyproject.toml requires a refreshed workspace uv.lock
        entry: uv lock --check
        language: system
        files: ^libs/ejkernel/pyproject\.toml$
        pass_filenames: false
        stages: [pre-push]
      - id: uv-lock-eformer
        name: uv.lock fresh for libs/eformer
        description: Pushing changes to libs/eformer/pyproject.toml requires a refreshed workspace uv.lock
        entry: uv lock --check
        language: system
        files: ^libs/eformer/pyproject\.toml$
        pass_filenames: false
        stages: [pre-push]
      - id: subtree-mirror-sync
        name: Push libs/* updates to standalone mirrors
        description: Pushes spectrax/ejkernel/eformer subtrees to their mirror repos when they changed (SUBTREE_SYNC_SKIP=1 to bypass)
        entry: scripts/subtree-sync.sh auto
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        verbose: true

      - id: docker-build-push
        name: Docker Build and Push (Manual)
        description: Build and optionally push Docker images when DOCKER_BUILD is set
        entry: bash -c 'if [[ -n "$DOCKER_BUILD" ]]; then ./scripts/docker-build-push.sh $DOCKER_BUILD_ARGS; fi'
        language: system
        pass_filenames: false
        always_run: false
        stages: [manual]
