name: Workspace CI

# Affected-only verification: each push/PR runs (a) the import-layering
# contract and (b) a fast functional smoke for every workspace package whose
# files changed (a foundation-lib change also smokes easydel, which sits on
# top of all three). The deep per-package test suites are too large/hardware-
# bound for per-PR CI and run locally / on dedicated runners — see WORKSPACE.md.

on:
  push:
    branches: [main, vnext]
  pull_request:
    branches: [main, vnext]
  workflow_dispatch:

concurrency:
  group: workspace-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      spectrax: ${{ steps.filter.outputs.spectrax }}
      ejkernel: ${{ steps.filter.outputs.ejkernel }}
      eformer: ${{ steps.filter.outputs.eformer }}
      easydel: ${{ steps.filter.outputs.easydel }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            spectrax: ['libs/spectrax/**']
            ejkernel: ['libs/ejkernel/**']
            eformer: ['libs/eformer/**']
            easydel: ['libs/easydel/**']
            root: ['pyproject.toml', 'uv.lock']

  import-contract:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync
      - name: Enforce layering (foundation libs independent, none import easydel)
        run: uv run lint-imports

  smoke:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lib: spectrax
            module: spectrax
          - lib: ejkernel
            module: ejkernel
          - lib: eformer
            module: eformer
          - lib: easydel
            module: easydel
    steps:
      - name: Skip if unaffected
        id: gate
        run: |
          AFFECTED="${{ needs.changes.outputs[matrix.lib] }}"
          ROOT="${{ needs.changes.outputs.root }}"
          # easydel sits on top of the three libs: any lib change affects it
          ANYLIB="false"
          if [ "${{ matrix.lib }}" = "easydel" ]; then
            [ "${{ needs.changes.outputs.spectrax }}" = "true" ] && ANYLIB=true
            [ "${{ needs.changes.outputs.ejkernel }}" = "true" ] && ANYLIB=true
            [ "${{ needs.changes.outputs.eformer }}" = "true" ] && ANYLIB=true
          fi
          if [ "$AFFECTED" = "true" ] || [ "$ROOT" = "true" ] || [ "$ANYLIB" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: astral-sh/setup-uv@v5
        if: steps.gate.outputs.run == 'true'
        with:
          enable-cache: true

      - name: Sync workspace
        if: steps.gate.outputs.run == 'true'
        run: uv sync

      - name: Import smoke
        if: steps.gate.outputs.run == 'true'
        env:
          JAX_PLATFORMS: cpu
          ENABLE_DISTRIBUTED_INIT: "0"
        run: uv run python -c "import ${{ matrix.module }} as m; print(m.__name__, getattr(m, '__version__', 'ok'))"

      - name: Functional smoke (easydel tiny forward)
        if: steps.gate.outputs.run == 'true' && matrix.lib == 'easydel'
        env:
          JAX_PLATFORMS: cpu
          ENABLE_DISTRIBUTED_INIT: "0"
        run: |
          uv run python - <<'PY'
          import easydel as ed, jax.numpy as jnp, spectrax as spx
          cfg = ed.LlamaConfig(vocab_size=128, hidden_size=64, intermediate_size=128,
              num_hidden_layers=2, num_attention_heads=4, num_key_value_heads=2,
              head_dim=16, max_position_embeddings=64, mlp_bias=False)
          m = ed.LlamaForCausalLM(config=cfg, rngs=spx.Rngs(0), dtype=jnp.float32, param_dtype=jnp.float32)
          ids = jnp.array([[1, 2, 3, 4, 5, 6, 7, 8]])
          out, _ = m.compute_loss(input_ids=ids, labels=ids)
          assert float(out.loss) > 0, "degenerate loss"
          print("easydel smoke OK, loss:", round(float(out.loss), 4))
          PY
